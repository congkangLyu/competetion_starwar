# Small, practical search space for the mission-oriented peaking preset.
#
# Start with random sampling, for example:
#   python tools/search_params.py configs/peaking.yaml search_spaces/peaking_core.yaml \
#     --opponent preset:ow_proto --mode random --samples 24 --games 10 -p 4 \
#     --out runs/search-peaking-core
#
# This space intentionally avoids timing/geometry knobs such as
# sun_safety, route_search_horizon, and intercept_tolerance at first.
# Those are more likely to change basic shot validity and should be
# explored separately after the high-level mission weights are understood.

parameters:
  reserve_floor: [4, 5, 6]
  defense_buffer: [1, 2, 3]
  proactive_defense_horizon: [14, 18, 22]
  attack_margin_base: [1, 2, 3]
  attack_margin_prod_weight: [1.2, 1.5, 1.8]
  hostile_value_mult: [1.45, 1.65, 1.85]
  static_value_mult: [1.1, 1.25, 1.4]
  contested_neutral_mult: [0.6, 0.75, 0.9]
  comet_value_mult: [0.5, 0.7, 0.9]
  partial_source_min_ships: [5, 6, 8]
  max_missions_per_turn: [6, 8, 10]
  max_sources_per_target: [2, 3, 4]
  reinforce_source_fraction: [0.45, 0.55, 0.65]
  cost_turn_weight: [0.45, 0.55, 0.65]
