[pytest]
# Tests live under tests/. We follow the legacy `smoke_test_*.py` naming
# alongside the pytest default `test_*.py` so old direct-runs and pytest
# collection both work.
testpaths = tests
python_files = test_*.py smoke_test_*.py
python_classes = Test*
python_functions = test_*

# Show one line per test instead of dots; show captured stdout on failure.
addopts =
    -ra
    --strict-markers
    --tb=short

# Tag long-running or env-dependent tests with markers so they can be
# selected/skipped explicitly.
markers =
    parity: byte-equivalence check between new and old implementations
    needs_kaggle: requires the real kaggle_environments package (skipped without it)
